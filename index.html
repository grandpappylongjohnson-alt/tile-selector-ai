<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI-powered tile selection game with minesweeper mechanics">
<meta name="theme-color" content="#0b0f1a">
<title>Tile Selector AI</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230b0f1a' width='192' height='192'/><rect fill='%2300ffd5' x='40' y='40' width='112' height='112' rx='16'/><text x='96' y='120' font-size='80' fill='%230b0f1a' text-anchor='middle' font-weight='bold'>AI</text></svg>">
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0b0f1a 0%, #1a1f3a 100%);
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

header {
  text-align: center;
  margin-bottom: 30px;
}

h1 {
  margin: 0;
  font-size: clamp(24px, 6vw, 48px);
  background: linear-gradient(135deg, #00ffd5, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 900;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 14px;
  color: #888;
  margin-top: 5px;
}

.status {
  font-size: 18px;
  font-weight: 600;
  color: #00ffd5;
  margin-bottom: 20px;
  min-height: 24px;
  text-shadow: 0 0 10px rgba(0, 255, 213, 0.3);
}

.game-container {
  background: rgba(30, 35, 51, 0.6);
  border: 2px solid rgba(0, 255, 213, 0.1);
  border-radius: 20px;
  padding: 30px;
  backdrop-filter: blur(10px);
  max-width: 600px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0, 255, 213, 0.1), inset 0 1px 0 rgba(255,255,255,0.1);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
  gap: 10px;
  margin: 20px 0;
  min-height: 320px;
  max-width: 100%;
}

@media (max-width: 480px) {
  .grid { gap: 6px; }
  .game-container { padding: 20px; }
}

.tile {
  aspect-ratio: 1;
  background: linear-gradient(135deg, #1e2333 0%, #2a2f45 100%);
  border: 2px solid rgba(0, 255, 213, 0.15);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: clamp(24px, 8vw, 40px);
  font-weight: bold;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.tile:hover:not(.revealed) {
  transform: translateY(-2px);
  border-color: rgba(0, 255, 213, 0.4);
  background: linear-gradient(135deg, #252d42 0%, #313745 100%);
  box-shadow: 0 4px 12px rgba(0, 255, 213, 0.2);
}

.tile:active:not(.revealed) {
  transform: translateY(1px);
}

.tile.revealed {
  cursor: default;
  border-color: rgba(0, 255, 213, 0.3);
  font-weight: 900;
}

.tile.safe {
  background: linear-gradient(135deg, #1f8f4a 0%, #2db855 100%);
  border-color: rgba(45, 184, 85, 0.5);
  box-shadow: 0 0 20px rgba(45, 184, 85, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
}

.tile.mine {
  background: linear-gradient(135deg, #b3261e 0%, #d32f2f 100%);
  border-color: rgba(211, 47, 47, 0.5);
  box-shadow: 0 0 20px rgba(211, 47, 47, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}

.tile.suggest {
  box-shadow: inset 0 0 0 2px #00ffd5, 0 0 15px rgba(0, 255, 213, 0.6);
  animation: pulse-glow 2s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: inset 0 0 0 2px #00ffd5, 0 0 15px rgba(0, 255, 213, 0.6); }
  50% { box-shadow: inset 0 0 0 2px #00ffd5, 0 0 25px rgba(0, 255, 213, 0.9); }
}

.panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin: 20px 0;
  font-size: 14px;
}

@media (max-width: 480px) {
  .panel { grid-template-columns: 1fr; font-size: 13px; }
}

.stat {
  background: rgba(0, 255, 213, 0.05);
  border: 1px solid rgba(0, 255, 213, 0.15);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.stat-label {
  color: #888;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}

.stat-value {
  font-size: 20px;
  font-weight: 900;
  color: #00ffd5;
  text-shadow: 0 0 10px rgba(0, 255, 213, 0.3);
}

.buttons {
  display: flex;
  gap: 12px;
  margin-top: 25px;
  flex-wrap: wrap;
}

@media (max-width: 480px) {
  .buttons { flex-direction: column; }
}

button {
  flex: 1;
  padding: 12px 24px;
  border: 2px solid rgba(0, 255, 213, 0.3);
  border-radius: 10px;
  background: rgba(0, 255, 213, 0.1);
  color: #00ffd5;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  min-height: 44px;
}

button:hover {
  background: rgba(0, 255, 213, 0.2);
  border-color: #00ffd5;
  box-shadow: 0 0 15px rgba(0, 255, 213, 0.4);
  transform: translateY(-2px);
}

button:active {
  transform: translateY(0);
}

button.secondary {
  border-color: rgba(255, 100, 100, 0.3);
  color: #ff6464;
  background: rgba(255, 100, 100, 0.05);
}

button.secondary:hover {
  background: rgba(255, 100, 100, 0.15);
  border-color: #ff6464;
  box-shadow: 0 0 15px rgba(255, 100, 100, 0.3);
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.active { display: flex; }

.modal-content {
  background: linear-gradient(135deg, #0b0f1a 0%, #1a1f3a 100%);
  border: 2px solid rgba(0, 255, 213, 0.2);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.modal-content h2 {
  margin-top: 0;
  color: #00ffd5;
  text-align: center;
}

.modal-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin: 20px 0;
}

.modal-stat {
  background: rgba(0, 255, 213, 0.05);
  border: 1px solid rgba(0, 255, 213, 0.15);
  border-radius: 10px;
  padding: 15px;
  text-align: center;
}

.modal-stat-label {
  color: #888;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.modal-stat-value {
  font-size: 24px;
  font-weight: 900;
  color: #00ffd5;
}

.install-prompt {
  background: rgba(0, 255, 213, 0.05);
  border: 1px solid rgba(0, 255, 213, 0.2);
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  font-size: 13px;
  color: #ccc;
}

.install-prompt button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
}

footer {
  margin-top: 40px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

footer a {
  color: #00ffd5;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

@supports (display: grid) {
  .tile {
    font-size: max(24px, 3vw);
  }
}
</style>
</head>

<body>

<header>
  <h1>🎯 TILE SELECTOR AI</h1>
  <div class="subtitle">Strategic minesweeper with AI suggestions</div>
</header>

<div class="game-container">
  <div class="status" id="status" role="status" aria-live="polite">Initializing game...</div>
  
  <div class="grid" id="grid" role="main" aria-label="Game grid"></div>
  
  <div class="panel" id="panel">
    <div class="stat">
      <div class="stat-label">Safe Picks</div>
      <div class="stat-value"><span id="safeCount">0</span>/<span id="maxSafe">3</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Remaining</div>
      <div class="stat-value" id="remaining">25</div>
    </div>
    <div class="stat">
      <div class="stat-label">Mines</div>
      <div class="stat-value" id="mineCount">3</div>
    </div>
    <div class="stat">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" id="winRate">0%</div>
    </div>
  </div>
  
  <div class="buttons">
    <button onclick="resetGame()" aria-label="Start a new game">🔄 New Game</button>
    <button onclick="toggleAutoSave()" id="autoSaveBtn" aria-label="Toggle auto-save feature">💾 Auto-Save: ON</button>
    <button onclick="showStatsModal()" aria-label="View game statistics">📊 Stats</button>
  </div>
</div>

<div class="modal" id="statsModal">
  <div class="modal-content">
    <h2>Game Statistics</h2>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-label">Total Games</div>
        <div class="modal-stat-value" id="modalGames">0</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">Wins</div>
        <div class="modal-stat-value" id="modalWins">0</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">Best Streak</div>
        <div class="modal-stat-value" id="modalStreak">0</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">Win Rate</div>
        <div class="modal-stat-value" id="modalWinRate">0%</div>
      </div>
    </div>
    <div id="installPrompt" class="install-prompt" style="display:none;">
      <strong>💡 Install as App</strong><br>
      Get offline access and install on your home screen!
      <button onclick="installPWA()">⬇️ Install Now</button>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button onclick="closeStatsModal()" style="flex: 1;">Close</button>
      <button onclick="clearAllStats()" class="secondary" style="flex: 1;">Clear History</button>
    </div>
  </div>
</div>

<footer>
  <p>Made with ❤️ | <a href="https://github.com/grandpappylongjohnson-alt/tile-selector-ai" target="_blank">GitHub Repo</a></p>
</footer>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
}

const CONFIG = {
  mines: 3,
  maxSafePicks: 3,
  gridSize: 25
};

let board = [];
let revealed = [];
let safeCount = 0;
let gameOver = false;
let autoSave = true;
let deferredPrompt = null;

function init() {
  board = Array(CONFIG.gridSize).fill('safe');
  revealed = [];
  safeCount = 0;
  gameOver = false;

  let placed = 0;
  while (placed < CONFIG.mines) {
    let r = Math.floor(Math.random() * CONFIG.gridSize);
    if (board[r] === 'safe') {
      board[r] = 'mine';
      placed++;
    }
  }
  saveGame();
}

function getSuggestions() {
  if (gameOver) return [];

  let scores = [];
  const unrevealed = CONFIG.gridSize - revealed.length;
  const baseRisk = CONFIG.mines / unrevealed;

  for (let i = 0; i < CONFIG.gridSize; i++) {
    if (revealed.includes(i)) continue;

    let score = 1 - baseRisk;
    let noise = (Math.random() * 0.05) - 0.025;
    
    // Spatial spreading: prefer tiles not near recently picked
    if (revealed.length > 0) {
      let minDist = Math.min(...revealed.map(r => Math.abs(i - r)));
      score += Math.min(minDist * 0.02, 0.15);
    }
    
    score += noise;
    scores.push({ i, score: Math.max(0, Math.min(1, score)) });
  }

  return scores
    .sort((a, b) => b.score - a.score)
    .slice(0, 3)
    .map(x => x.i);
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let suggestions = getSuggestions();

  for (let i = 0; i < CONFIG.gridSize; i++) {
    let tile = document.createElement('div');
    tile.className = 'tile';
    tile.setAttribute('role', 'button');
    tile.setAttribute('tabindex', '0');
    tile.setAttribute('aria-label', `Tile ${i + 1}`);

    if (suggestions.includes(i) && !revealed.includes(i)) {
      tile.classList.add('suggest');
      tile.setAttribute('aria-label', `Tile ${i + 1} - AI Recommended`);
    }

    if (revealed.includes(i)) {
      tile.classList.add('revealed');
      if (board[i] === 'mine') {
        tile.classList.add('mine');
        tile.innerText = '💣';
        tile.setAttribute('aria-label', `Mine at position ${i + 1}`);
      } else {
        tile.classList.add('safe');
        tile.innerText = '✓';
        tile.setAttribute('aria-label', `Safe tile at position ${i + 1}`);
      }
    }

    tile.onclick = () => clickTile(i);
    tile.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        clickTile(i);
      }
    });
    grid.appendChild(tile);
  }

  updatePanel();
}

function clickTile(i) {
  if (gameOver || revealed.includes(i)) return;

  revealed.push(i);

  if (board[i] === 'mine') {
    gameOver = true;
    document.getElementById('status').innerText = '💥 MINE HIT — You lost this round';
    document.getElementById('status').style.color = '#ff6464';
    revealAll();
    updateStats('loss');
  } else {
    safeCount++;
    const progress = safeCount === 1 ? '🎯' : safeCount === 2 ? '🎯🎯' : '🎯🎯🎯';
    
    if (safeCount >= CONFIG.maxSafePicks) {
      gameOver = true;
      document.getElementById('status').innerText = `✅ ${progress} VICTORY! All safe picks complete!`;
      document.getElementById('status').style.color = '#00ffd5';
      updateStats('win');
    } else {
      document.getElementById('status').innerText = `${progress} Safe pick (${safeCount}/${CONFIG.maxSafePicks})`;
      document.getElementById('status').style.color = '#00ffd5';
    }
  }

  saveGame();
  render();
}

function revealAll() {
  for (let i = 0; i < CONFIG.gridSize; i++) {
    if (!revealed.includes(i)) revealed.push(i);
  }
}

function updatePanel() {
  const remaining = CONFIG.gridSize - revealed.length;
  document.getElementById('safeCount').innerText = safeCount;
  document.getElementById('maxSafe').innerText = CONFIG.maxSafePicks;
  document.getElementById('remaining').innerText = remaining;
  document.getElementById('mineCount').innerText = CONFIG.mines;
  
  const stats = getStats();
  const winRate = stats.totalGames > 0 ? Math.round((stats.wins / stats.totalGames) * 100) : 0;
  document.getElementById('winRate').innerText = winRate + '%';
}

function resetGame() {
  init();
  document.getElementById('status').innerText = '🎮 New round started — Pick a tile';
  document.getElementById('status').style.color = '#00ffd5';
  render();
}

function saveGame() {
  if (!autoSave) return;
  const gameState = { board, revealed, safeCount, gameOver };
  localStorage.setItem('tileAI_gameState', JSON.stringify(gameState));
}

function loadGame() {
  const saved = localStorage.getItem('tileAI_gameState');
  if (saved) {
    const state = JSON.parse(saved);
    board = state.board || board;
    revealed = state.revealed || revealed;
    safeCount = state.safeCount || 0;
    gameOver = state.gameOver || false;
    return true;
  }
  return false;
}

function toggleAutoSave() {
  autoSave = !autoSave;
  document.getElementById('autoSaveBtn').innerText = `💾 Auto-Save: ${autoSave ? 'ON' : 'OFF'}`;
  if (autoSave) saveGame();
}

function getStats() {
  const saved = localStorage.getItem('tileAI_stats') || '{"totalGames":0,"wins":0,"currentStreak":0,"bestStreak":0}';
  return JSON.parse(saved);
}

function updateStats(result) {
  let stats = getStats();
  stats.totalGames++;
  
  if (result === 'win') {
    stats.wins++;
    stats.currentStreak = (stats.currentStreak || 0) + 1;
    if (stats.currentStreak > stats.bestStreak) {
      stats.bestStreak = stats.currentStreak;
    }
  } else {
    stats.currentStreak = 0;
  }
  
  localStorage.setItem('tileAI_stats', JSON.stringify(stats));
}

function showStatsModal() {
  const stats = getStats();
  const winRate = stats.totalGames > 0 ? Math.round((stats.wins / stats.totalGames) * 100) : 0;
  
  document.getElementById('modalGames').innerText = stats.totalGames;
  document.getElementById('modalWins').innerText = stats.wins;
  document.getElementById('modalStreak').innerText = stats.bestStreak;
  document.getElementById('modalWinRate').innerText = winRate + '%';
  
  if (deferredPrompt) {
    document.getElementById('installPrompt').style.display = 'block';
  }
  
  document.getElementById('statsModal').classList.add('active');
}

function closeStatsModal() {
  document.getElementById('statsModal').classList.remove('active');
}

function clearAllStats() {
  if (confirm('Clear all game history? This cannot be undone.')) {
    localStorage.removeItem('tileAI_stats');
    localStorage.removeItem('tileAI_gameState');
    closeStatsModal();
    resetGame();
  }
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choiceResult => {
      if (choiceResult.outcome === 'accepted') {
        deferredPrompt = null;
        closeStatsModal();
      }
    });
  }
}

window.addEventListener('beforeunload', () => saveGame());
window.addEventListener('click', e => {
  const modal = document.getElementById('statsModal');
  if (e.target === modal) closeStatsModal();
});

// Initialize
if (!loadGame()) {
  init();
}
render();
</script>

</body>
</html>
